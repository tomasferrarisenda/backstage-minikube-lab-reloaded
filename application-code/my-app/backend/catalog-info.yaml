apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: my-app-backend
  description: My-App Backend Service
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: my-app-backend
    github.com/project-slug: tomasferrarisenda/backstage-minikube-lab-reloaded
    # argocd/app-name: my-app-backend-dev # This is for Backstage ArgoCD plugin 
    argocd/app-selector: system-service=my-app-backend # This is for Backstage ArgoCD plugin 
    grafana/overview-dashboard: 'http://localhost:8082/d/k8s_views_global/kubernetes-views-global?orgId=1&refresh=30s&from=1711929905403&to=1711933505403'
    # The following selector will return dashboards that have a my-service or a my-service-slo tag and have a generated tag.
    # grafana/dashboard-selector: "(tags @> 'my-service' || tags @> 'my-service-slo') && tags @> 'generated'"
    grafana/dashboard-selector: "title @> 'Node Exporter Full'"
    # grafana/overview-dashboard: 'http://localhost:8082/d-solo/k8s_views_global/kubernetes-views-global?orgId=1&refresh=30s&from=1711929938081&to=1711933538081&panelId=77'
    # grafana/overview-dashboard: 'https://fr.wikipedia.org/wiki/Main_Page'
  tags:
    - nodejs
  links:
    - title: Documentation
      url: https://github.com/tomasferrarisenda/backstage-minikube-lab-reloaded
    - url: https://admin.example-org.com
      title: Admin Dashboard
      icon: dashboard
      type: admin-dashboard
    - url: https://grafana.domain.com/
      title: metrics
      icon: analytics
      type: metrics-dashboard
    - url: https://grafana.domain.com/
      title: logs
      icon: assignment
      type: logs-dashboard  
spec:
  type: service
  lifecycle: production
  owner: my-app-backend-subteam
  system: my-app
  dependsOn:
    - resource:default/my-app-redis
  providesApis:
    - my-app-backend-api
