apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: my-app-frontend
  description: My-App Frontend service
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: my-app-frontend
    github.com/project-slug: tomasferrarisenda/backstage-minikube-lab-reloaded
    # argocd/app-name: my-app-frontend-dev # This is for Backstage ArgoCD plugin 
    argocd/app-selector: system-service=my-app-frontend # This is for Backstage ArgoCD plugin 
    # The following selector will return dashboards that have a my-service or a my-service-slo tag and have a generated tag.
    # grafana/dashboard-selector: "(tags @> 'my-service' || tags @> 'my-service-slo') && tags @> 'generated'"
    grafana/dashboard-selector: "tags @> 'linux'"
    # grafana/overview-dashboard: 'http://localhost:8082/d/k8s_views_global/kubernetes-views-global?orgId=1&refresh=30s&from=1711929905403&to=1711933505403' # I couldn't make this work. Got error: Refused to frame 'https://localhost:8082/' because it violates the following Content Security Policy directive: "frame-src 'self' http://localhost:8082".
  tags:
    - nginx
  links:
    - title: Documentation
      url: https://github.com/tomasferrarisenda/backstage-minikube-lab-reloaded
    - url: https://admin.example-org.com
      title: Admin Dashboard
      icon: dashboard
      type: admin-dashboard
    - url: https://grafana.domain.com/
      title: metrics
      icon: analytics
      type: metrics-dashboard
    - url: https://grafana.domain.com/
      title: logs
      icon: assignment
      type: logs-dashboard  
spec:
  type: service
  lifecycle: production
  owner: group:default/my-app-frontend-subteam
  system: my-app
  dependsOn:
    - component:default/my-app-backend
  consumesApis:
    - my-app-backend-api

